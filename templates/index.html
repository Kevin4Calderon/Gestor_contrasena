<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador Seguro 🔐</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    background:
        linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
        url("/static/contras.jpg");

    background-size: cover;
    background-position: center;
    height: 100vh;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: rgba(31,41,55,0.85);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    width: 420px;
    text-align: center;
}

input {
    padding: 8px;
    border-radius: 8px;
    border: none;
    margin: 5px;
    width: 90%;
    text-align: center;
}

button {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

.resultado {
    margin-top: 10px;
    background: #111827;
    padding: 10px;
    border-radius: 8px;
    white-space: pre-line;
}

/* 🔥 BARRA */
.barra {
    height: 10px;
    border-radius: 5px;
    margin-top: 10px;
    background: #374151;
    overflow: hidden;
}

.fuerza {
    height: 100%;
    width: 0%;
    transition: 0.4s ease;
}
</style>
</head>

<body>

<div class="card">

<h2>🔐 Generador de Contraseñas</h2>

<input type="number" id="longitud" value="12" min="4">
<br>
<button onclick="generar()">Generar</button>

<div class="resultado" id="resultado"></div>

<div class="barra">
    <div class="fuerza" id="fuerza"></div>
</div>

<hr>

<h3>🔍 Evaluar contraseña</h3>

<input type="password" id="inputPassword" placeholder="Escribe tu contraseña">

<label>
    <input type="checkbox" onclick="togglePassword('inputPassword')">
    Mostrar contraseña 👁️
</label>

<br>
<button onclick="evaluar()">Evaluar</button>

<div class="resultado" id="resultadoEval"></div>

<button onclick="mejorar()">Mejorar contraseña</button>

<input type="password" id="passwordMejorada" readonly>

<label>
    <input type="checkbox" onclick="togglePassword('passwordMejorada')">
    Mostrar contraseña 👁️
</label>

</div>

<script>
async function generar() {
    const longitud = document.getElementById("longitud").value;

    const response = await fetch(`/generar?longitud=${longitud}`);
    const data = await response.json();

    document.getElementById("resultado").innerText = data.password;

    evaluarFuerza(data.password);
}

async function evaluar() {
    const password = document.getElementById("inputPassword").value;

    const response = await fetch(`/evaluar?password=${password}`);
    const data = await response.json();

    let texto = "Nivel: " + data.score + "/6\n";

    if (data.sugerencias.length > 0) {
        texto += "Sugerencias:\n- " + data.sugerencias.join("\n- ");
    } else {
        texto += "Contraseña segura ✅";
    }

    document.getElementById("resultadoEval").innerText = texto;

    evaluarFuerza(password);
}

async function mejorar() {
    const password = document.getElementById("inputPassword").value;

    const response = await fetch(`/mejorar?password=${password}`);
    const data = await response.json();

    document.getElementById("passwordMejorada").value = data.password_mejorada;
}

// 👁️ MOSTRAR / OCULTAR
function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

// 🔥 BARRA DETALLADA
function evaluarFuerza(password) {

    const longitud = password.length;
    const barra = document.getElementById("fuerza");

    let porcentaje = 0;
    let color = "";

    switch (longitud) {
        case 4: porcentaje = 10; color = "#7f1d1d"; break;
        case 5: porcentaje = 15; color = "#991b1b"; break;
        case 6: porcentaje = 20; color = "#b91c1c"; break;
        case 7: porcentaje = 30; color = "#ea580c"; break;
        case 8: porcentaje = 40; color = "#f97316"; break;
        case 9: porcentaje = 50; color = "#f59e0b"; break;
        case 10: porcentaje = 60; color = "#eab308"; break;
        case 11: porcentaje = 75; color = "#a3e635"; break;
        case 12: porcentaje = 90; color = "#4ade80"; break;
        default:
            if (longitud >= 13) {
                porcentaje = 100;
                color = "#16a34a"; // 🔥 totalmente segura
            }
    }

    barra.style.width = porcentaje + "%";
    barra.style.background = color;
}
</script>

</body>
</html>
